<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>용어 정리장</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --primary: #4F6EF7;
    --primary-dark: #3A56D4;
    --bg: #F4F6FB;
    --card: #FFFFFF;
    --text: #1A1D2E;
    --sub: #6B7280;
    --border: #E5E7EB;
    --danger: #EF4444;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(79,110,247,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  header { background: var(--primary); color: #fff; padding: 14px 18px 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(79,110,247,0.25); }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  header h1 { font-size: 1.15rem; font-weight: 700; }
  header .subtitle { font-size: 0.73rem; opacity: 0.8; margin-top: 2px; }
  .stat-chips { display: flex; gap: 7px; margin-top: 9px; flex-wrap: wrap; }
  .chip { background: rgba(255,255,255,0.18); border-radius: 20px; padding: 3px 10px; font-size: 0.71rem; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; }
  .chip:hover, .chip.active { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.5); }

  /* Toolbar */
  .toolbar { padding: 12px 14px 6px; display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; padding: 10px 14px 10px 36px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.87rem; background: var(--card); color: var(--text); outline: none; transition: border .15s; }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-wrap .ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: .95rem; color: var(--sub); }

  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 9px 13px; border-radius: 10px; border: none; font-size: 0.81rem; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: var(--card); color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-outline:hover { background: #EEF1FF; }
  .btn-ghost { background: rgba(255,255,255,0.15); color: #fff; border: 1.5px solid rgba(255,255,255,0.35); }
  .btn-ghost:hover { background: rgba(255,255,255,0.28); }
  .btn-sm { padding: 6px 10px; font-size: 0.76rem; border-radius: 8px; }
  .btn-danger { background: #FEF2F2; color: var(--danger); border: 1.5px solid #FCA5A5; }
  .btn-danger:hover { background: #FEE2E2; }

  /* Sort bar */
  .sort-bar { padding: 0 14px 8px; display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
  .sort-bar::-webkit-scrollbar { display: none; }
  .sort-btn { padding: 5px 12px; border-radius: 20px; font-size: 0.76rem; font-weight: 600; border: 1.5px solid var(--border); background: var(--card); color: var(--sub); cursor: pointer; white-space: nowrap; transition: all .15s; }
  .sort-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .count-bar { padding: 0 14px 6px; font-size: 0.77rem; color: var(--sub); }
  .count-bar strong { color: var(--primary); }

  /* Cards */
  .cards { padding: 0 12px 100px; display: grid; gap: 10px; grid-template-columns: 1fr; }
  @media (min-width: 600px)  { .cards { grid-template-columns: repeat(2,1fr); padding: 0 18px 100px; } }
  @media (min-width: 960px)  { .cards { grid-template-columns: repeat(3,1fr); } }
  @media (min-width: 1280px) { .cards { grid-template-columns: repeat(4,1fr); } }

  .card { background: var(--card); border-radius: var(--radius); padding: 15px; box-shadow: var(--shadow); border: 1.5px solid var(--border); transition: transform .12s, box-shadow .12s; position: relative; overflow: hidden; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,110,247,0.13); }
  .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 12px 0 0 12px; }
  .card-inner { padding-left: 10px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .card-term { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.3; word-break: break-all; }
  .card-eng { font-size: 0.78rem; color: var(--sub); font-style: italic; margin-bottom: 6px; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.69rem; font-weight: 600; margin-bottom: 6px; }
  .card-desc { font-size: 0.84rem; color: #374151; line-height: 1.65; white-space: pre-wrap; word-break: break-all; }
  .card-meta { margin-top: 8px; font-size: 0.71rem; color: var(--sub); }
  .card-note { margin-top: 7px; padding: 7px 9px; background: #F9FAFB; border-radius: 8px; font-size: 0.79rem; color: var(--sub); border-left: 3px solid var(--border); }

  .empty { text-align: center; padding: 60px 20px; color: var(--sub); grid-column: 1/-1; }
  .empty .ico { font-size: 3rem; margin-bottom: 10px; }

  /* FAB */
  .fab { position: fixed; bottom: 22px; right: 18px; width: 54px; height: 54px; border-radius: 50%; background: var(--primary); color: #fff; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 20px rgba(79,110,247,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform .15s, box-shadow .15s; }
  .fab:hover { transform: scale(1.08); }
  .fab:active { transform: scale(0.95); }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  @media (min-width: 600px) { .overlay { align-items: center; } }
  .modal { background: var(--card); width: 100%; max-width: 560px; border-radius: 20px 20px 0 0; padding: 22px 18px 30px; max-height: 92vh; overflow-y: auto; animation: slideUp .2s ease; }
  @media (min-width: 600px) { .modal { border-radius: 20px; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 38px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--sub); margin-bottom: 4px; }
  .field label span { color: var(--danger); }
  .field input, .field textarea, .field select { width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.88rem; color: var(--text); background: #fff; outline: none; transition: border .15s; font-family: inherit; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--primary); }
  .field textarea { height: 90px; resize: vertical; }
  .modal-footer { display: flex; gap: 8px; margin-top: 18px; }
  .modal-footer .btn { flex: 1; justify-content: center; padding: 11px; }

  /* Import modal */
  .import-area { border: 2px dashed var(--border); border-radius: 12px; padding: 28px 18px; text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 12px; }
  .import-area:hover, .import-area.drag { border-color: var(--primary); background: #F0F4FF; }
  .import-area .ico { font-size: 2rem; margin-bottom: 6px; }
  .import-area p { font-size: 0.84rem; color: var(--sub); }
  .import-area strong { color: var(--primary); }
  .col-map-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.82rem; }
  .col-map-row select { padding: 7px 9px; }
  .arrow { color: var(--primary); font-weight: 700; text-align: center; }
  .preview-table-wrap { overflow-x: auto; margin-top: 8px; }
  .preview-table { width: 100%; border-collapse: collapse; font-size: 0.77rem; }
  .preview-table th, .preview-table td { border: 1px solid var(--border); padding: 5px 7px; text-align: left; white-space: nowrap; }
  .preview-table th { background: #F9FAFB; font-weight: 600; }

  /* Toast */
  .toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); background: #1A1D2E; color: #fff; padding: 9px 18px; border-radius: 24px; font-size: 0.84rem; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity .25s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Category colors */
  .cat-0{background:#EEF1FF;color:#4F6EF7} .cat-1{background:#FFF3E0;color:#E67E00}
  .cat-2{background:#E8F5E9;color:#1B8A46} .cat-3{background:#FCE4EC;color:#C2185B}
  .cat-4{background:#F3E5F5;color:#7B1FA2} .cat-5{background:#E0F7FA;color:#00838F}
  .cat-6{background:#FFF8E1;color:#F57F17} .cat-7{background:#E8EAF6;color:#3949AB}
  .acc-0{background:#4F6EF7} .acc-1{background:#E67E00}
  .acc-2{background:#1B8A46} .acc-3{background:#C2185B}
  .acc-4{background:#7B1FA2} .acc-5{background:#00838F}
  .acc-6{background:#F57F17} .acc-7{background:#3949AB}
  .hidden { display: none !important; }

  /* ── Quiz ── */
  .quiz-modal { max-width: 600px; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .quiz-score { font-size: 0.82rem; color: var(--sub); font-weight: 600; }
  .quiz-score strong { color: var(--primary); font-size: 1rem; }
  .quiz-progress { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .quiz-progress-bar { height: 100%; background: var(--primary); border-radius: 2px; transition: width .4s ease; }
  .quiz-cat { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-bottom: 12px; }
  .quiz-question {
    background: #F8FAFF;
    border: 1.5px solid #DDE5FF;
    border-radius: 14px;
    padding: 18px 16px;
    font-size: 0.92rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 20px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .blank {
    display: inline-block;
    background: #1A1D2E;
    color: #1A1D2E;
    border-radius: 4px;
    padding: 1px 6px;
    letter-spacing: 2px;
    font-weight: 700;
    user-select: none;
    min-width: 60px;
    text-align: center;
  }
  .quiz-options { display: grid; gap: 9px; }
  .quiz-opt {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
    transition: all .15s;
    text-align: left;
    width: 100%;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--primary); background: #F0F4FF; }
  .quiz-opt .num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; flex-shrink: 0;
    border: 1.5px solid var(--border);
    transition: all .15s;
  }
  .quiz-opt.correct { border-color: #10B981; background: #F0FDF4; }
  .quiz-opt.correct .num { background: #10B981; color: #fff; border-color: #10B981; }
  .quiz-opt.wrong { border-color: var(--danger); background: #FEF2F2; }
  .quiz-opt.wrong .num { background: var(--danger); color: #fff; border-color: var(--danger); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 0.86rem;
    font-weight: 600;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: #F0FDF4; color: #059669; border: 1.5px solid #A7F3D0; }
  .quiz-feedback.fail { background: #FEF2F2; color: #DC2626; border: 1.5px solid #FECACA; }
  .quiz-next { margin-top: 14px; width: 100%; padding: 13px; display: none; }
  .quiz-next.show { display: flex; justify-content: center; }

  /* 결과 화면 */
  .quiz-result { text-align: center; padding: 20px 10px; }
  .quiz-result .score-big { font-size: 3rem; font-weight: 800; color: var(--primary); line-height: 1; }
  .quiz-result .score-label { font-size: 0.85rem; color: var(--sub); margin-top: 6px; margin-bottom: 20px; }
  .quiz-result .grade { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
  .result-bar { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .result-pill { padding: 6px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; }
  .result-pill.ok { background: #F0FDF4; color: #059669; }
  .result-pill.fail { background: #FEF2F2; color: #DC2626; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>📚 용어 정리장</h1>
      <div class="subtitle" id="headerSub">로딩 중...</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="openImport()">⬆ 가져오기</button>
      <button class="btn btn-ghost btn-sm" onclick="exportXlsx()">⬇ 내보내기</button>
    </div>
  </div>
  <div class="stat-chips" id="catChips"></div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="ico">🔍</span>
    <input type="text" id="searchInput" placeholder="용어·영어명·설명 검색..." oninput="render()">
  </div>
  <button class="btn btn-primary" onclick="openQuiz()" style="gap:5px">📝 시험문제</button>
</div>

<div class="sort-bar">
  <button class="sort-btn active" onclick="setSort('가나다',this)">가나다순</button>
  <button class="sort-btn" onclick="setSort('최신',this)">최신순</button>
  <button class="sort-btn" onclick="setSort('오래된',this)">오래된순</button>
  <button class="sort-btn" onclick="setSort('카테고리',this)">카테고리순</button>
</div>

<div class="count-bar" id="countBar"></div>
<div class="cards" id="cards"></div>

<button class="fab" onclick="openAdd()" title="새 용어 추가">＋</button>
<div class="toast" id="toast"></div>

<!-- 시험문제 모달 -->
<div class="overlay" id="quizOverlay" onclick="closeQuizIfBg(event)">
  <div class="modal quiz-modal">
    <div class="modal-handle"></div>

    <!-- 문제 화면 -->
    <div id="quizBody">
      <div class="quiz-header">
        <h2 style="margin:0">📝 시험문제</h2>
        <div class="quiz-score">맞춤 <strong id="qCorrect">0</strong> / <span id="qTotal">0</span>문제</div>
      </div>
      <div class="quiz-progress"><div class="quiz-progress-bar" id="qBar" style="width:0%"></div></div>
      <div id="qCat" class="quiz-cat"></div>
      <div class="quiz-question" id="qQuestion"></div>
      <div class="quiz-options" id="qOptions"></div>
      <div class="quiz-feedback" id="qFeedback"></div>
      <button class="btn btn-primary quiz-next" id="qNext" onclick="nextQuestion()">다음 문제 →</button>
    </div>

    <!-- 결과 화면 -->
    <div id="quizResult" class="quiz-result hidden">
      <div style="font-size:2.5rem;margin-bottom:8px">🎉</div>
      <div class="score-big" id="rScore"></div>
      <div class="score-label" id="rLabel"></div>
      <div class="grade" id="rGrade"></div>
      <div class="result-bar">
        <div class="result-pill ok" id="rOk"></div>
        <div class="result-pill fail" id="rFail"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-outline" onclick="closeQuiz()">닫기</button>
        <button class="btn btn-primary" onclick="startQuiz()">다시 풀기</button>
      </div>
    </div>
  </div>
</div>

<!-- 용어 추가/수정 모달 -->
<div class="overlay" id="editOverlay" onclick="closeEditIfBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="editTitle">새 용어 추가</h2>
    <input type="hidden" id="editId">
    <div class="field"><label>용어 <span>*</span></label><input type="text" id="fTerm" placeholder="한글 용어명"></div>
    <div class="field"><label>영어 (English)</label><input type="text" id="fEng" placeholder="예: Median plane"></div>
    <div class="field"><label>카테고리</label><input type="text" id="fCat" placeholder="예: 의학이론, 손해사정, AI..." list="catList"><datalist id="catList"></datalist></div>
    <div class="field"><label>설명 <span>*</span></label><textarea id="fDesc" placeholder="용어의 정의, 설명을 입력하세요"></textarea></div>
    <div class="field"><label>출처 / 페이지</label><input type="text" id="fSource" placeholder="예: 교재 p.45, 법령 제3조"></div>
    <div class="field"><label>비고 / 암기 포인트</label><textarea id="fNote" placeholder="암기 팁, 추가 메모..." style="height:65px"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEdit()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- Import 모달 -->
<div class="overlay" id="importOverlay" onclick="closeImportIfBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>엑셀 파일 가져오기</h2>
    <div class="import-area" id="dropArea"
         onclick="document.getElementById('fileInput').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <div class="ico">📂</div>
      <p><strong>클릭</strong>하거나 파일을 드래그하세요</p>
      <p style="margin-top:4px;font-size:0.74rem">xlsx, xls, csv 지원</p>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(event)">

    <div id="mapSection" class="hidden">
      <p style="font-size:0.81rem;color:var(--sub);margin-bottom:8px">📌 엑셀 컬럼을 항목에 매핑하세요</p>
      <div class="col-map" id="colMap"></div>
      <p style="font-size:0.77rem;color:var(--sub);margin:10px 0 5px">미리보기 (최대 3행)</p>
      <div class="preview-table-wrap"><table class="preview-table" id="previewTable"></table></div>
      <div style="margin-top:12px">
        <label style="font-size:0.81rem;display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="appendMode" checked>
          기존 데이터에 추가 (해제 시 전체 교체)
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeImport()">취소</button>
      <button class="btn btn-primary" id="importBtn" onclick="doImport()" disabled>가져오기</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'glossary_v4';
let data = [], filterCat = null, sortMode = '가나다';
let sheetData = null, sheetHeaders = [];
const CAT_COLORS = ['cat-0','cat-1','cat-2','cat-3','cat-4','cat-5','cat-6','cat-7'];
const ACC_COLORS  = ['acc-0','acc-1','acc-2','acc-3','acc-4','acc-5','acc-6','acc-7'];
const catColorMap = {};

function getCatColor(cat) {
  if (!cat) return {tag:'cat-0', acc:'acc-0'};
  if (catColorMap[cat] === undefined) catColorMap[cat] = Object.keys(catColorMap).length % 8;
  return {tag: CAT_COLORS[catColorMap[cat]], acc: ACC_COLORS[catColorMap[cat]]};
}

function load() { try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { data = []; } }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function getCategories() { return [...new Set(data.map(d=>d.cat).filter(Boolean))].sort(); }

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = data.filter(d => {
    const mc = !filterCat || d.cat === filterCat;
    const mq = !q || [d.term, d.eng, d.desc, d.note].some(v=>(v||'').toLowerCase().includes(q));
    return mc && mq;
  });
  list = list.slice().sort((a,b) => {
    if (sortMode==='가나다')   return a.term.localeCompare(b.term,'ko');
    if (sortMode==='최신')    return b.id - a.id;
    if (sortMode==='오래된')  return a.id - b.id;
    if (sortMode==='카테고리') return (a.cat||'').localeCompare(b.cat||'','ko') || a.term.localeCompare(b.term,'ko');
  });

  document.getElementById('countBar').innerHTML = `총 <strong>${data.length}</strong>개 중 <strong>${list.length}</strong>개 표시`;
  document.getElementById('headerSub').textContent = `총 ${data.length}개 용어 · ${getCategories().length}개 카테고리`;

  const cats = getCategories();
  document.getElementById('catChips').innerHTML =
    `<span class="chip${!filterCat?' active':''}" onclick="setFilter(null)">전체 ${data.length}</span>` +
    cats.map(c=>`<span class="chip${filterCat===c?' active':''}" onclick="setFilter('${escH(c)}')">${escH(c)} ${data.filter(d=>d.cat===c).length}</span>`).join('');
  document.getElementById('catList').innerHTML = cats.map(c=>`<option value="${escH(c)}">`).join('');

  const el = document.getElementById('cards');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="ico">🔍</div><p>${q||filterCat?'검색 결과가 없어요.':'+ 버튼으로 첫 용어를 추가하세요!'}</p></div>`;
    return;
  }
  el.innerHTML = list.map(d => {
    const c = getCatColor(d.cat);
    return `<div class="card">
      <div class="card-accent ${c.acc}"></div>
      <div class="card-inner">
        <div class="card-top">
          <div>
            <div class="card-term">${hl(escH(d.term),q)}</div>
            ${d.eng ? `<div class="card-eng">${hl(escH(d.eng),q)}</div>` : ''}
          </div>
        </div>
        ${d.cat ? `<span class="tag ${c.tag}">${escH(d.cat)}</span>` : ''}
        <div class="card-desc">${hl(escH(d.desc||''),q)}</div>
        ${d.source ? `<div class="card-meta">📎 ${escH(d.source)}</div>` : ''}
        ${d.note   ? `<div class="card-note">💡 ${escH(d.note)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
    '<mark style="background:#FEF08A;border-radius:3px;padding:0 1px">$1</mark>');
}
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setFilter(cat) { filterCat=cat; render(); }
function setSort(m,btn) { sortMode=m; document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }

// CRUD
function nextId() { return data.length ? Math.max(...data.map(d=>d.id))+1 : 1; }
function openAdd() {
  document.getElementById('editTitle').textContent='새 용어 추가';
  document.getElementById('editId').value='';
  ['fTerm','fEng','fCat','fDesc','fSource','fNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTerm').focus(),100);
}
function openEdit(id) {
  const d=data.find(x=>x.id===id); if(!d)return;
  document.getElementById('editTitle').textContent='용어 수정';
  document.getElementById('editId').value=id;
  document.getElementById('fTerm').value=d.term||'';
  document.getElementById('fEng').value=d.eng||'';
  document.getElementById('fCat').value=d.cat||'';
  document.getElementById('fDesc').value=d.desc||'';
  document.getElementById('fSource').value=d.source||'';
  document.getElementById('fNote').value=d.note||'';
  document.getElementById('editOverlay').classList.add('open');
}
function saveEdit() {
  const term=document.getElementById('fTerm').value.trim();
  const desc=document.getElementById('fDesc').value.trim();
  if(!term){toast('용어명을 입력해주세요 ❗');return;}
  if(!desc){toast('설명을 입력해주세요 ❗');return;}
  const id=document.getElementById('editId').value;
  const entry={id:id?parseInt(id):nextId(),term,eng:document.getElementById('fEng').value.trim(),cat:document.getElementById('fCat').value.trim(),desc,source:document.getElementById('fSource').value.trim(),note:document.getElementById('fNote').value.trim()};
  if(id){data[data.findIndex(x=>x.id===parseInt(id))]=entry;toast('수정 완료 ✅');}
  else{data.push(entry);toast('추가 완료 ✅');}
  save();closeEdit();render();
}
function del(id){if(!confirm('삭제할까요?'))return;data=data.filter(x=>x.id!==id);save();render();toast('삭제됨 🗑');}
function closeEdit(){document.getElementById('editOverlay').classList.remove('open');}
function closeEditIfBg(e){if(e.target===document.getElementById('editOverlay'))closeEdit();}

// Import
function openImport(){sheetData=null;sheetHeaders=[];document.getElementById('mapSection').classList.add('hidden');document.getElementById('importBtn').disabled=true;document.getElementById('fileInput').value='';document.getElementById('importOverlay').classList.add('open');}
function closeImport(){document.getElementById('importOverlay').classList.remove('open');}
function closeImportIfBg(e){if(e.target===document.getElementById('importOverlay'))closeImport();}
function handleDrop(e){e.preventDefault();document.getElementById('dropArea').classList.remove('drag');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);}
function handleFile(e){if(e.target.files[0])processFile(e.target.files[0]);}
function processFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      sheetData=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(!sheetData.length){toast('데이터가 없습니다');return;}
      sheetHeaders=sheetData[0].map(String);
      buildColMap();buildPreview();
      document.getElementById('mapSection').classList.remove('hidden');
      document.getElementById('importBtn').disabled=false;
    }catch(e){toast('파일 읽기 실패: '+e.message);}
  };
  reader.readAsBinaryString(file);
}

const FIELDS=[
  {key:'term',  label:'용어 *'},
  {key:'eng',   label:'영어명'},
  {key:'cat',   label:'카테고리'},
  {key:'desc',  label:'설명'},
  {key:'source',label:'출처'},
  {key:'note',  label:'비고'},
];
const AUTO_KW={
  term:  ['용어','term','단어','word','항목','name','명칭'],
  eng:   ['영어','english','eng','영문','원어'],
  cat:   ['카테고리','category','분류','구분','과목','cat'],
  desc:  ['설명','description','뜻','정의','내용','의미','desc','definition'],
  source:['출처','source','페이지','page','참고','ref'],
  note:  ['비고','note','메모','암기','tip','포인트'],
};
function guessCol(field){
  const kws=AUTO_KW[field]||[];
  for(let i=0;i<sheetHeaders.length;i++){const h=sheetHeaders[i].toLowerCase();if(kws.some(k=>h.includes(k)))return i;}
  return -1;
}
function buildColMap(){
  document.getElementById('colMap').innerHTML=FIELDS.map(f=>{
    const g=guessCol(f.key);
    const opts=sheetHeaders.map((h,i)=>`<option value="${i}"${i===g?' selected':''}>${h}</option>`).join('');
    return `<div class="col-map-row"><div style="font-weight:600">${escH(f.label)}</div><div class="arrow">→</div><select id="map_${f.key}"><option value="-1">— 사용 안 함 —</option>${opts}</select></div>`;
  }).join('');
}
function buildPreview(){
  const rows=sheetData.slice(1,4);
  document.getElementById('previewTable').innerHTML=
    `<tr>${sheetHeaders.map(h=>`<th>${escH(h)}</th>`).join('')}</tr>`+
    rows.map(r=>`<tr>${sheetHeaders.map((_,i)=>`<td>${escH(r[i]||'')}</td>`).join('')}</tr>`).join('');
}
function doImport(){
  if(!sheetData)return;
  const gc=key=>parseInt(document.getElementById('map_'+key).value);
  if(gc('term')<0){toast('용어 컬럼을 선택해주세요 ❗');return;}
  const append=document.getElementById('appendMode').checked;
  const baseData=append?data:[];
  const existTerms=new Set(baseData.map(d=>d.term.trim()));
  let baseId=baseData.length?Math.max(...baseData.map(d=>d.id))+1:1;
  const items=[], skipped=[];
  sheetData.slice(1).forEach((row,ri)=>{
    const term=String(row[gc('term')]||'').trim();
    if(!term)return;
    if(existTerms.has(term)){skipped.push(term);return;}
    existTerms.add(term);
    items.push({id:baseId+ri,term,eng:gc('eng')>=0?String(row[gc('eng')]||'').trim():'',cat:gc('cat')>=0?String(row[gc('cat')]||'').trim():'',desc:gc('desc')>=0?String(row[gc('desc')]||'').trim():'',source:gc('source')>=0?String(row[gc('source')]||'').trim():'',note:gc('note')>=0?String(row[gc('note')]||'').trim():''});
  });
  data=[...baseData,...items];
  save();render();closeImport();
  const msg=skipped.length?`${items.length}개 추가, ${skipped.length}개 중복 건너뜀 ✅`:`${items.length}개 용어를 가져왔습니다 ✅`;
  toast(msg);
}

// Export — 영어 컬럼 포함
function exportXlsx(){
  if(!data.length){toast('내보낼 데이터가 없습니다');return;}
  const rows=[['용어','영어','카테고리','설명','출처','비고'],...data.map(d=>[d.term,d.eng,d.cat,d.desc,d.source,d.note])];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[18,20,12,50,18,28].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'용어정리');
  XLSX.writeFile(wb,`용어정리_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('엑셀 파일 저장 완료 📥');
}

// Toast
let tt;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2200);}

// ─────────────────────────────────────────
// Quiz
// ─────────────────────────────────────────
let quizQueue=[], quizIdx=0, quizCorrect=0, quizAnswered=false;

function openQuiz(){
  if(data.length<4){toast('용어가 4개 이상 필요합니다 ❗');return;}
  document.getElementById('quizOverlay').classList.add('open');
  startQuiz();
}
function closeQuiz(){document.getElementById('quizOverlay').classList.remove('open');}
function closeQuizIfBg(e){if(e.target===document.getElementById('quizOverlay'))closeQuiz();}

function startQuiz(){
  // 설명이 있는 항목만 사용
  const pool=data.filter(d=>d.desc&&d.desc.trim());
  if(pool.length<4){toast('설명이 있는 용어가 4개 이상 필요합니다 ❗');closeQuiz();return;}
  // 셔플 후 최대 20문제
  quizQueue=shuffle([...pool]).slice(0,Math.min(10,pool.length));
  quizIdx=0; quizCorrect=0;
  document.getElementById('quizBody').classList.remove('hidden');
  document.getElementById('quizResult').classList.add('hidden');
  showQuestion();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function showQuestion(){
  const q=quizQueue[quizIdx];
  const total=quizQueue.length;
  quizAnswered=false;

  // 진행률
  document.getElementById('qBar').style.width=`${(quizIdx/total)*100}%`;
  document.getElementById('qTotal').textContent=total;
  document.getElementById('qCorrect').textContent=quizCorrect;

  // 카테고리
  const catEl=document.getElementById('qCat');
  if(q.cat){
    const c=getCatColor(q.cat);
    catEl.className=`quiz-cat tag ${c.tag}`;
    catEl.textContent=q.cat;
    catEl.style.display='';
  } else { catEl.style.display='none'; }

  // 설명에서 용어 블락 처리 (대소문자 무관, 용어 전체 + 영어명)
  let desc=escH(q.desc);
  const terms=[q.term, q.eng].filter(Boolean);
  terms.forEach(t=>{
    const re=new RegExp(escH(t).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    desc=desc.replace(re,`<span class="blank">${'█'.repeat(Math.max(4,t.length))}</span>`);
  });
  document.getElementById('qQuestion').innerHTML=`<div style="font-size:0.75rem;color:var(--sub);margin-bottom:8px">다음 설명에 해당하는 용어는?</div>${desc}`;

  // 보기 4개 생성 (정답 1 + 오답 3)
  const others=shuffle(data.filter(d=>d.id!==q.id)).slice(0,3).map(d=>d.term);
  const opts=shuffle([q.term,...others]);
  const nums=['①','②','③','④'];

  document.getElementById('qOptions').innerHTML=opts.map((opt,i)=>`
    <button class="quiz-opt" onclick="selectOpt(this,'${escH(opt)}','${escH(q.term)}')">
      <span class="num">${nums[i]}</span>
      <span>${escH(opt)}</span>
    </button>`).join('');

  // 피드백/다음 초기화
  const fb=document.getElementById('qFeedback');
  fb.className='quiz-feedback'; fb.textContent='';
  const nx=document.getElementById('qNext');
  nx.className='btn btn-primary quiz-next';
  nx.textContent= quizIdx===quizQueue.length-1 ? '결과 보기 🏁' : '다음 문제 →';
}

function selectOpt(btn, selected, correct){
  if(quizAnswered)return;
  quizAnswered=true;
  const isCorrect=selected===correct;
  if(isCorrect) quizCorrect++;
  document.getElementById('qCorrect').textContent=quizCorrect;

  // 버튼 스타일
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    const label=b.querySelector('span:last-child').textContent;
    b.disabled=true;
    if(label===correct) b.classList.add('correct');
    else if(b===btn && !isCorrect) b.classList.add('wrong');
  });

  // 피드백
  const fb=document.getElementById('qFeedback');
  if(isCorrect){
    fb.className='quiz-feedback show ok';
    fb.textContent='✅ 정답입니다!';
  } else {
    fb.className='quiz-feedback show fail';
    fb.textContent=`❌ 오답! 정답은 "${correct}" 입니다.`;
  }
  document.getElementById('qNext').classList.add('show');
}

function nextQuestion(){
  quizIdx++;
  if(quizIdx>=quizQueue.length){ showResult(); return; }
  showQuestion();
}

function showResult(){
  document.getElementById('quizBody').classList.add('hidden');
  document.getElementById('quizResult').classList.remove('hidden');
  const total=quizQueue.length, pct=Math.round((quizCorrect/total)*100);
  document.getElementById('rScore').textContent=`${pct}점`;
  document.getElementById('rLabel').textContent=`${total}문제 중 ${quizCorrect}개 정답`;
  let grade='💪 더 공부하세요!';
  if(pct>=90) grade='🥇 최우수'; else if(pct>=70) grade='🥈 우수'; else if(pct>=50) grade='🥉 보통';
  document.getElementById('rGrade').textContent=grade;
  document.getElementById('rOk').textContent=`✅ 정답 ${quizCorrect}개`;
  document.getElementById('rFail').textContent=`❌ 오답 ${total-quizCorrect}개`;
  document.getElementById('qBar').style.width='100%';
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeEdit();closeImport();closeQuiz();}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&document.getElementById('editOverlay').classList.contains('open'))saveEdit();
});
